<div class="main-row">
    <!-- 1. 영상 다운로드 -->
    <div class="section-frame">
        <h3 class="section-header">1. 영상 다운로드</h3>
        <div class="setting-row" style="margin-bottom: 10px;">
            <input type="text" id="url-input" placeholder="URL을 입력하세요" style="flex-grow: 1;">
            <button id="add-url-button" style="background-color: #818CF8; flex-grow: 0;">URL 추가</button>
        </div>
            <div class="list-field" id="downloadUrlList">
                <!-- URL list will be shown here -->
            </div>
            <div class="button-group">
                <button id="start-download-button" style="background-color: #4ADE80;">다운로드 시작</button>
            </div>
        </div>
        <!-- 2. 영상 다운완료 -->
        <div class="section-frame">
            <h3 class="section-header">2. 영상 다운완료</h3>
            <div class="list-field" id="completeList">
                <!-- Download complete list will be shown here -->
            </div>
            <div class="button-group">
                <button style="background-color: #FCA5A5;">목록삭제</button>
            </div>
        </div>
        <!-- 3. 영상 폴더 -->
        <div class="section-frame">
            <h3 class="section-header">3. 영상 폴더</h3>
            <div class="list-field" id="videoFileList">
                <!-- Video file list will be shown here -->
            </div>
            <div class="button-group">
                <button style="background-color: #9CA3AF;">폴더 열기</button>
            </div>
        </div>
        <!-- 4. 자막 폴더 -->
        <div class="section-frame">
            <h3 class="section-header">4. 자막 폴더</h3>
            <div class="list-field" id="subtitleFileList">
                <!-- Subtitle file list will be shown here -->
            </div>
            <div class="button-group">
                <!-- No buttons here -->
            </div>
        </div>
    </div>
</div>
