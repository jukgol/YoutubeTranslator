<div class="main-row">
    <!-- 1. 영상목록 -->
    <div class="section-frame">
        <h3 class="section-header">1. 영상목록</h3>
        <div class="list-field" id="subtitleVideoList">
            <!-- Video file list will be shown here -->
        </div>
        <div class="button-group">
            <button id="subtitle-add-to-queue-btn" class="action-button"
                style="background-color: #90EE90; color: black;">큐에 추가</button>
            <button id="subtitle-add-all-to-queue-btn" class="action-button"
                style="background-color: #60A5FA; color: white;">모든파일넣기</button>
            <button id="subtitle-open-video-folder-button" style="background-color: #9CA3AF;">폴더 열기</button>
        </div>
    </div>

    <!-- 2. 대기 리스트 -->
    <div class="section-frame">
        <h3 class="section-header">2. 대기 리스트</h3>
        <div class="list-field" id="waitingList">
            <!-- Waiting list will be shown here -->
        </div>
        <div class="button-group">
            <button id="subtitle-start-btn" class="action-button">시작</button>
            <button id="subtitle-stop-btn" class="action-button" style="background-color: #EC4899;">중지</button>
            <button id="subtitle-clear-btn" class="action-button" style="background-color: #F87171;">비우기</button>
        </div>
    </div>

    <!-- 3. 진행사항 -->
    <div class="section-frame" style="min-height: 100px;">
        <h3 class="section-header">3. 진행사항</h3>
        <div id="progressSection" style="padding: 10px; font-size: 16px; font-weight: bold; text-align: center;">
            0% 진행중
        </div>
        <div class="button-group" style="justify-content: center; margin-top: 10px; flex-direction: column; align-items: center; gap: 15px;">
            <div class="engine-selector">
                <input type="radio" id="engine-whisper" name="stt-engine" value="whisper">
                <label for="engine-whisper">Whisper</label>
                <input type="radio" id="engine-sense" name="stt-engine" value="sense" checked>
                <label for="engine-sense">Sense</label>
            </div>
            <select id="subtitle-language-select" style="padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px; width: 200px; background-color: var(--bg-color); color: var(--text-main);">
                <option value="">언어 자동 (Auto)</option>
                <option value="ko">한국어 (Korean)</option>
                <option value="en">영어 (English)</option>
                <option value="zh" selected>중국어 (Chinese - Mandarin)</option>
                <option value="yue">광동어 (Chinese - Cantonese)</option>
                <option value="ja">일본어 (Japanese)</option>
            </select>
            <button id="model-download-btn" class="action-button" style="background-color: #6366f1; color: white; width: 200px; font-size: 14px;">모델 다운로드</button>
        </div>
    </div>

    <!-- 4. 원본 자막 -->
    <div class="section-frame">
        <h3 class="section-header">4. 원본 자막</h3>
        <div class="list-field" id="originList">
            <!-- Origin file list will be shown here -->
        </div>
        <div class="button-group">
            <button id="subtitle-open-origin-folder-button" style="background-color: #9CA3AF;">폴더 열기</button>
        </div>
    </div>
</div>
