<div class="main-row">
    <!-- 1. 원본 데이터 -->
    <div class="section-frame">
        <h3 class="section-header">1. 원본 데이터</h3>
        <div class="list-field">
            <!-- Content for origin_list -->
            <ul id="video-list" class="item-list">
                <!-- Video items will be rendered here -->
            </ul>
        </div>
        <div class="button-group">
            <button id="add-to-queue-btn" style="background-color: #818CF8;">리스트 추가</button>
            <button id="open-original-data-folder-button" style="background-color: #9CA3AF;">폴더 열기</button>
        </div>
    </div>

    <!-- 2. 작업 큐 -->
    <div class="section-frame">
        <h3 class="section-header">2. 작업 큐</h3>
        <div class="list-field">
            <!-- Content for queue_list -->
            <ul id="queue-list" class="item-list">
                <!-- Queue items will be rendered here -->
            </ul>
        </div>
        <div class="button-group">
            <button id="queue-start-btn" style="background-color: #4ADE80;">번역 시작</button>
            <button id="queue-stop-btn" style="background-color: #F87171;">멈춤</button>
            <button id="clear-queue-btn" style="background-color: #9CA3AF;">큐 초기화</button>
        </div>
    </div>

    <!-- 3. 진행 상태 -->
    <div class="section-frame">
        <h3 class="section-header">3. 진행 상태</h3>
        <div class="status-label-container">
            <div class="status-label">• 원본 분리 중</div>
            <div class="status-label">• 번역 진행 중</div>
            <div class="status-label">• 파트 합치는 중</div>
            <div class="status-label">• 최종 결합 중</div>
            <div class="status-label active">• 모든 공정 완료</div>
        </div>
        <div class="button-group">
            <button id="start-test-btn" style="background-color: #38BDF8;">테스트 시작</button>
            <button id="status-stop-btn" style="background-color: #F87171;">멈춤</button>
        </div>
    </div>

    <!-- 4. 최종 결과 -->
    <div class="section-frame">
        <h3 class="section-header">4. 최종 결과</h3>
        <div class="list-field">
            <!-- Content for result_list -->
            <p>최종 번역 결과 파일 목록이 여기에 표시됩니다.</p>
        </div>
        <div class="button-group">
            <button id="move-file-btn" style="background-color: #C084FC;">파일 복사</button>
            <button id="open-final-result-folder-button" style="background-color: #9CA3AF;">폴더 열기</button>
        </div>
    </div>
</div>
